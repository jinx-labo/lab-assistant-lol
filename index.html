<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lab-assistant-lol</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #533483);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: #fff;
      text-align: center;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .container { padding: 2rem; }
    .hero-title {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 12px #ff4f7b, 0 0 30px #ff4f7b, 0 0 60px #c2185b;
      animation: pulse 2.5s ease-in-out infinite;
    }
    .hero-subtitle {
      margin-top: 0.6rem;
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 400;
      letter-spacing: 1px;
      opacity: 0.9;
      color: #f0c040;
      text-shadow: 0 0 8px #f0c04088;
    }
    .divider {
      margin: 2rem auto;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #7d5fff, #ff4f7b);
      border-radius: 2px;
      opacity: 0.7;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      letter-spacing: 2px;
      text-shadow: 0 0 10px #7d5fff, 0 0 20px #7d5fff, 0 0 40px #533483;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    p {
      margin-top: 1rem;
      font-size: 1.1rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero-title">Assistant LoL</div>
    <div class="hero-subtitle">tes 3 conseils de matchup, en un coup d'œil</div>
    <div class="divider"></div>
    <h1>lab-assistant-lol</h1>
    <p>Lab Jinx — prêt à l'action ⚡</p>
  </div>
</body>
</html>
